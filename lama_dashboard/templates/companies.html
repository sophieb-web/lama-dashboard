{% extends "base.html" %}
{% set active = "companies" %}

{% block page_title %}Companies{% endblock %}

{% block content %}
<div class="filters-panel">
  <div class="filter-group">
    <label>Sector</label>
    <select id="filter-sector" onchange="applyTableFilters()">
      <option value="">All Sectors</option>
      <option>AI Security</option><option>Cloud Security</option>
      <option>Data Security</option><option>Identity & Access</option>
      <option>Application Security</option><option>Supply Chain Security</option>
      <option>Security Operations</option><option>Network Security</option>
      <option>Endpoint & XDR</option><option>OT / ICS / IoT</option>
      <option>GRC & Compliance</option><option>Threat Intelligence</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Stage</label>
    <select id="filter-stage" onchange="applyTableFilters()">
      <option value="">All Stages</option>
      <option>Seed</option><option>Series A</option><option>Series B</option>
      <option>Series C+</option><option>Series D+</option>
      <option>Acquired</option><option>Public</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Founded After</label>
    <select id="filter-year" onchange="applyTableFilters()">
      <option value="">Any Year</option>
      {% for y in range(2010, 2027) %}
      <option value="{{ y }}">{{ y }}+</option>
      {% endfor %}
    </select>
  </div>
  <div class="filter-group">
    <label>Military Unit</label>
    <select id="filter-military" onchange="applyTableFilters()">
      <option value="">All</option>
      <option value="8200">Unit 8200</option>
      <option value="Matzov">Matzov</option>
      <option value="Unit 81">Unit 81</option>
    </select>
  </div>
  <div class="filter-group">
    <label>&nbsp;</label>
    <label class="filter-toggle">
      <input type="checkbox" id="filter-portfolio" onchange="applyTableFilters()">
      Portfolio Only
    </label>
  </div>
  <div class="filter-group">
    <label>&nbsp;</label>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="resetTableFilters()">Reset</button>
      <button class="btn btn-secondary" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
  </div>
</div>

<div class="card">
  <div style="overflow-x:auto">
    <table class="data-table" id="companies-table">
      <thead>
        <tr>
          <th onclick="sortTable('name')" data-col="name">Company <span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('sector')" data-col="sector">Sector <span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('founding_year')" data-col="founding_year">Founded <span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('total_raised')" data-col="total_raised">Raised ($M) <span class="sort-arrow">↕</span></th>
          <th onclick="sortTable('stage')" data-col="stage">Stage <span class="sort-arrow">↕</span></th>
          <th>Lead Investors</th>
          <th>Founders</th>
          <th onclick="sortTable('military_unit')" data-col="military_unit">Military <span class="sort-arrow">↕</span></th>
          <th>Acquired?</th>
          <th>Portfolio?</th>
        </tr>
      </thead>
      <tbody id="companies-tbody">
        <tr><td colspan="10" class="loading-overlay"><div class="spinner"></div> Loading companies…</td></tr>
      </tbody>
    </table>
  </div>
  <div class="pagination" id="table-pagination"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/companies_table.js"></script>
{% endblock %}
